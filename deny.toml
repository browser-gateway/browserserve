[advisories]
yanked = "deny"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
deny = [
  { crate = "serde_yml", reason = "RUSTSEC-2025-0068: unsound, unmaintained fork; use serde_yaml_ng" },
  { crate = "fastwebsockets", reason = "soundness concerns, low bus factor; use tokio-tungstenite" },
  { crate = "openssl", reason = "static musl builds; use rustls if TLS is ever needed" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
